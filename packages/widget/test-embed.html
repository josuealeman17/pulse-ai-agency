<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Widget — Production Bundle Test</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #fff; color: #111; }
      .page { max-width: 720px; margin: 0 auto; padding: 64px 24px; }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>Production Bundle Test</h1>
      <p>This page loads the built <code>dist/chat.js</code> exactly how a real client would, via a single &lt;script&gt; tag.</p>
      <p>Build first: <code>npm run build:widget</code>, then serve this folder and open this file.</p>
    </div>

    <!-- This is the snippet a client pastes onto their site -->
    <script
      src="./dist/chat.js"
      data-client-id="demo"
      data-theme="light"
      data-accent="#2563EB"
      data-api="http://localhost:8787"
      async
    ></script>
  </body>
</html>
