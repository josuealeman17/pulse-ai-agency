<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Reviews — Dev Harness</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
      .page { max-width: 920px; margin: 0 auto; padding: 64px 24px; }
      h1 { font-size: 28px; }
      p { color: #475569; line-height: 1.6; }
      .section { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 28px; margin-top: 24px; }
      code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>Pulse Reviews — Dev Harness</h1>
      <p>Simulates a client's website "What our customers say" section. The grid below is the inline embed running against the local API (<code>data-client-id="demo"</code> → demo reviews).</p>
      <p>Run the API first: <code>npm run dev:api</code>.</p>

      <div class="section">
        <h2>What our customers say</h2>
        <!-- The embed renders into this container if present. -->
        <div id="pulse-reviews"></div>
      </div>
    </div>

    <!-- Settings carrier: read from the script's data-* attributes. -->
    <script
      data-client-id="demo"
      data-theme="light"
      data-accent="#0EA5E9"
      data-api="http://localhost:8787"
    ></script>
    <!-- Dev entry (production builds a single reviews.js instead). -->
    <script type="module" src="/src/reviews/main.tsx"></script>
  </body>
</html>
